<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KEKS Werkzeugkasten</title>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23ff4f00'/></svg>" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <a class="brand-logo" href="/" aria-label="KEKS Architekten – Startseite">
        <img class="logo-light" src="/assets/keks-logo-black.png" alt="KEKS Architekten" />
        <img class="logo-dark" src="/assets/keks-logo-white.png" alt="KEKS Architekten" />
      </a>
      <span class="brand-divider" aria-hidden="true"></span>
      <span class="brand-product">Werkzeugkasten</span>
    </div>
    <div class="topbar-actions">
      <div class="search">
        <span class="search-icon">⌕</span>
        <input id="search" type="search" placeholder="Tool suchen…" autocomplete="off" />
      </div>
      <button id="theme-toggle" class="icon-btn" title="Hell/Dunkel umschalten" aria-label="Theme umschalten">◐</button>
      <div class="auth-area">
        <button id="auth-btn" class="icon-btn" title="Anmelden" aria-label="Anmelden">👤</button>
        <div id="auth-menu" class="auth-menu" hidden>
          <div id="auth-menu-name" class="auth-menu-name"></div>
          <a id="auth-menu-admin" class="auth-menu-link" href="/admin.html" hidden>Admin-Bereich</a>
          <button id="auth-menu-logout" class="auth-menu-link">Abmelden</button>
        </div>
      </div>
    </div>
  </header>

  <nav id="filters" class="filters" aria-label="Kategorien"></nav>

  <main id="content" class="content">
    <div id="grid" class="grid"></div>
    <div id="empty" class="empty" hidden>
      <p>Keine Tools gefunden.</p>
      <p class="empty-hint">Neues Tool anlegen: Ordner unter <code>tools/</code> mit einer <code>tool.json</code>.</p>
    </div>
  </main>

  <footer class="footer">
    <span id="tool-count"></span>
  </footer>

  <!-- Modal für Script-Ausgabe -->
  <div id="modal" class="modal" hidden>
    <div class="modal-box" role="dialog" aria-modal="true">
      <div class="modal-head">
        <h2 id="modal-title">Ausgabe</h2>
        <button id="modal-close" class="icon-btn" aria-label="Schließen">✕</button>
      </div>
      <div id="modal-status" class="modal-status"></div>
      <pre id="modal-output" class="modal-output"></pre>
    </div>
  </div>

  <!-- Modal für Login / Registrierung -->
  <div id="auth-modal" class="modal" hidden>
    <div class="modal-box auth-modal-box" role="dialog" aria-modal="true">
      <div class="modal-head">
        <h2 id="auth-modal-title">Anmelden</h2>
        <button id="auth-modal-close" class="icon-btn" aria-label="Schließen">✕</button>
      </div>
      <div class="auth-tabs">
        <button id="auth-tab-login" class="chip active" type="button">Anmelden</button>
        <button id="auth-tab-register" class="chip" type="button">Registrieren</button>
      </div>
      <form id="auth-form" class="auth-form">
        <label class="auth-label">Benutzername
          <input id="auth-username" type="text" autocomplete="username" required minlength="3" maxlength="32" />
        </label>
        <label class="auth-label">Passwort
          <input id="auth-password" type="password" autocomplete="current-password" required minlength="8" />
        </label>
        <div id="auth-message" class="auth-message" hidden></div>
        <button id="auth-submit" class="btn" type="submit">Anmelden</button>
      </form>
    </div>
  </div>

  <script src="/toolbox-client.js"></script>
  <script src="/app.js"></script>
</body>
</html>
